[Service]
SERVER_URL="192.168.1.10:8080"
ENVIRONMENT="production"
ZONES_FILE="{{ home }}/zones.yaml"
AUTH_TOKEN="{{ auth_token }}"
DAILY_PROGRAMS_FILE="{{ home }}/daily_programs.yaml"
ODD_PROGRAMS_FILE="{{ home }}/odd_programs.yaml"
EVEN_PROGRAMS_FILE="{{ home }}/even_programs.yaml"
WEEKLY_PROGRAMS_FILE="{{ home }}/weekly_programs.yaml"
TEMPERATURE_PROGRAMS_FILE="{{ home }}/temperature_programs.yaml"
EXECUTION_LOGS_FILE="{{ home }}/execution_logs.json"
TELEGRAM_TOKEN="{{ telegram_token }}"
TELEGRAM_CHAT_ID="{{ telegram_chat_id }}"
TELEGRAM_BOT_ENABLED=true